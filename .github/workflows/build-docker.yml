name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      commit:
        description: "Optional commit SHA to build (defaults to current ref)"
        type: string
        required: false

concurrency:
  group: build-docker-${{ github.event.inputs.commit || github.sha }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-jar:
    name: Build OSS uberjar
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      MB_EDITION: oss
      INTERACTIVE: false
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit || github.sha }}

      - name: Prepare front-end environment
        uses: ./.github/actions/prepare-frontend
        with:
          node-version: "22"

      - name: Prepare back-end environment
        uses: ./.github/actions/prepare-backend
        with:
          java-version: "21"

      - name: Build uberjar
        run: ./bin/build.sh

      - name: Stage jar in docker context
        run: |
          mkdir -p docker-context
          cp bin/docker/Dockerfile bin/docker/run_metabase.sh bin/docker/DigiCertGlobalRootG2.crt.pem docker-context/
          cp target/uberjar/metabase.jar docker-context/metabase.jar

      - name: Upload docker context
        uses: actions/upload-artifact@v4
        with:
          name: docker-context
          path: docker-context/
          retention-days: 1
          if-no-files-found: error

  build-image:
    name: Build & push multi-arch image
    needs: build-jar
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Download docker context
        uses: actions/download-artifact@v4
        with:
          name: docker-context
          path: docker-context

      - name: Compute tags
        id: meta
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          REPO="ghcr.io/${OWNER}/metabase"
          REF="${{ github.event.inputs.commit || github.sha }}"
          SHORT_SHA="${REF:0:7}"
          BRANCH="${GITHUB_REF_NAME//\//-}"

          if [[ "$BRANCH" == "master" ]]; then
            PRIMARY_TAG="latest"
          else
            PRIMARY_TAG="$BRANCH"
          fi

          {
            echo "tags<<EOF"
            echo "${REPO}:${PRIMARY_TAG}"
            echo "${REPO}:sha-${SHORT_SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: docker-context
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            GIT_COMMIT_SHA=${{ github.event.inputs.commit || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
